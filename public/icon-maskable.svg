<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon: safe zone is central 80% circle, background fills edges -->
  <rect width="512" height="512" fill="#4A7C59"/>
  <!-- Hungarian flag stripe (subtle, top third) -->
  <rect y="0"   width="512" height="170" fill="#CE2939" opacity="0.85"/>
  <rect y="170" width="512" height="172" fill="#FFFFFF" opacity="0.15"/>
  <!-- Large "M" lettermark -->
  <text
    x="256" y="330"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="260"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    opacity="0.95"
  >M</text>
  <!-- Accent dot -->
  <circle cx="256" cy="392" r="18" fill="#FFD700" opacity="0.9"/>
</svg>
